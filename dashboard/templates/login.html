<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0e1a">
<title>Login - Terabot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',system-ui,sans-serif;
  background:#0b0e1a;
  color:#e0e4f0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100dvh;
  position:relative;
  overflow:hidden;
}

/* Subtle gradient overlay */
body::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(16,185,129,.06) 0%,transparent 60%),
             radial-gradient(ellipse at 50% 80%,rgba(6,182,212,.04) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

.login-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;max-width:380px;padding:0 28px;position:relative;z-index:1;
}

/* Logo */
.logo-area{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:36px}
.logo{
  width:80px;height:80px;
  background:linear-gradient(135deg,#0f2a1a,#1a3a2a);
  border:2px solid rgba(52,211,153,.2);
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:44px;
  box-shadow:0 12px 40px rgba(52,211,153,.12),0 0 60px rgba(16,185,129,.06);
}
.logo-title{font-size:14px;color:rgba(255,255,255,.5);font-weight:500;letter-spacing:2px;text-transform:uppercase}

/* Input fields */
.field{width:100%;margin-bottom:20px;position:relative}
.field-icon{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;color:rgba(255,255,255,.25);pointer-events:none;
}
.field input{
  width:100%;background:rgba(255,255,255,.04);
  color:#e0e4f0;
  border:none;border-bottom:1px solid rgba(255,255,255,.1);
  padding:16px 16px 16px 46px;
  font-size:15px;font-family:inherit;
  border-radius:0;
  transition:all .25s;
  outline:none;
}
.field input:focus{
  border-bottom-color:#10b981;
  background:rgba(255,255,255,.06);
}
.field input::placeholder{color:rgba(255,255,255,.25)}

/* Divider line */
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:8px 0 28px}

/* Login button */
.btn-login{
  width:100%;padding:16px;
  background:linear-gradient(135deg,#059669,#10b981,#06b6d4);
  border:none;color:#fff;
  font-size:15px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  border-radius:8px;cursor:pointer;
  font-family:inherit;
  transition:all .25s;
  box-shadow:0 4px 20px rgba(16,185,129,.25);
  position:relative;overflow:hidden;
}
.btn-login::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  transition:left .5s;
}
.btn-login:hover::after{left:100%}
.btn-login:hover{box-shadow:0 6px 28px rgba(16,185,129,.35);transform:translateY(-1px)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* Error */
.error{
  width:100%;background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.15);
  color:#f87171;padding:12px 16px;border-radius:10px;
  font-size:13px;margin-bottom:16px;display:none;text-align:center;
}
.error.show{display:block}

/* Footer */
.footer{
  position:absolute;bottom:0;left:0;right:0;
  text-align:center;padding:20px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom, 0px));
  font-size:11px;color:rgba(255,255,255,.2);line-height:1.5;
}
.footer a{color:rgba(16,185,129,.5);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Small phones */
@media(max-width:380px){
  .logo{width:64px;height:64px;font-size:36px;border-radius:20px}
  .logo-area{margin-bottom:28px}
  .field input{font-size:16px;padding:14px 14px 14px 42px}
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-area">
    <div class="logo">&#x1F40A;</div>
    <div class="logo-title">Terasofts Data Center</div>
  </div>

  <div class="error" id="error"></div>

  <form id="loginForm" onsubmit="doLogin(event)" style="width:100%">
    <div class="field">
      <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <input type="text" id="username" name="username" placeholder="Username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
    </div>

    <div class="divider"></div>

    <button type="submit" class="btn-login" id="loginBtn">LOGIN</button>
  </form>
</div>

<div class="footer">
  Terabot : AI Data Center
</div>

<script>
async function doLogin(e){
  e.preventDefault();
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('error');
  btn.disabled=true;btn.textContent='SIGNING IN...';
  err.classList.remove('show');

  const form=new FormData();
  form.append('username',document.getElementById('username').value);
  form.append('password',document.getElementById('password').value);

  try{
    const resp=await fetch('/login',{method:'POST',body:form,redirect:'follow'});
    if(resp.redirected){
      window.location.href=resp.url;
      return;
    }
    const data=await resp.json();
    if(data.error){
      err.textContent=data.error;
      err.classList.add('show');
    }
  }catch(ex){
    err.textContent='Connection error';
    err.classList.add('show');
  }
  btn.disabled=false;btn.textContent='LOGIN';
}
</script>
</body>
</html>
