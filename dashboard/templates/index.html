<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Terabot : AI Data Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000000;--card:#1c1c1e;--card2:#2c2c2e;--border:#2a2a2e;--border2:#3a3a3f;
  --text:#f2f2f7;--text2:#d1d1d6;--muted:#8e8e93;
  --pink:#34d399;--purple:#10b981;--magenta:#059669;
  --grad:linear-gradient(135deg,#059669,#10b981,#34d399);
  --grad2:linear-gradient(135deg,#059669,#10b981);
  --green:#34d399;--red:#f87171;
  --sidebar-w:320px;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px)
}
html{height:100%;overflow:hidden;position:fixed;width:100%}
body{font-family:-apple-system,'SF Pro Display','SF Pro Text','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100dvh;height:100%;overflow:hidden;position:fixed;width:100%;top:0;left:0}

/* ═══════════════════════════════════════
   SIDEBAR — Desktop
   ═══════════════════════════════════════ */
.sidebar{width:var(--sidebar-w);height:100%;background:#0a0a0a;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s cubic-bezier(.4,0,.2,1)}

/* Sidebar header */
.sidebar-head{padding:20px 20px 16px;display:flex;align-items:center;gap:14px}
.sidebar-head .logo{width:40px;height:40px;background:linear-gradient(135deg,#1a3a2a,#0f2a1a);border:1.5px solid #2a5a3a;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 6px 20px rgba(52,211,153,.12)}
.sidebar-brand{flex:1;min-width:0}
.sidebar-brand h2{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.sidebar-brand span{font-size:11px;color:var(--muted);font-weight:400;display:block;margin-top:1px}

/* New chat button */
.btn-new{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:0 20px;width:calc(100% - 40px);padding:12px 0;border-radius:16px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:4px}
.btn-new:hover{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25)}
.btn-new:active{transform:scale(.98)}
.btn-new svg{width:16px;height:16px;stroke:var(--purple)}

/* Section label */
.sidebar-label{padding:16px 20px 8px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label a{color:var(--purple);text-decoration:none;font-size:11px;font-weight:500;text-transform:none;letter-spacing:0}
.sidebar-label a:hover{text-decoration:underline}

/* Conversation list */
.sidebar-list{flex:1;overflow-y:auto;padding:0 8px;-webkit-overflow-scrolling:touch}
.sidebar-list::-webkit-scrollbar{width:3px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.conv-item{padding:12px 14px;border-radius:14px;cursor:pointer;margin-bottom:2px;transition:all .2s;position:relative;border:1px solid transparent;display:flex;align-items:center;gap:12px}
.conv-item:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.06)}
.conv-item.active{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.15)}
.conv-dot{width:8px;height:8px;border-radius:50%;background:var(--grad);flex-shrink:0;box-shadow:0 0 6px rgba(16,185,129,.3)}
.conv-item:nth-child(3n+2) .conv-dot{background:#6ee7b7;box-shadow:0 0 6px rgba(110,231,183,.3)}
.conv-item:nth-child(3n) .conv-dot{background:#059669;box-shadow:0 0 6px rgba(5,150,105,.3)}
.conv-info{flex:1;min-width:0}
.conv-item .conv-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.conv-item .conv-meta{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item .conv-arrow{color:var(--border2);font-size:16px;flex-shrink:0;opacity:0;transition:all .2s}
.conv-item:hover .conv-arrow{opacity:1;color:var(--muted)}
.conv-item .conv-delete{position:absolute;top:50%;right:10px;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;width:28px;height:28px;border-radius:8px;display:none;align-items:center;justify-content:center;transition:all .15s}
.conv-item:hover .conv-delete{display:flex}
.conv-item:hover .conv-arrow{display:none}
.conv-item .conv-delete:hover{color:var(--red);background:rgba(248,113,113,.1)}

.sidebar-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7}

/* Sidebar footer */
.sidebar-bottom{padding:16px 20px;border-top:1px solid var(--border)}
.sidebar-bottom a{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;text-decoration:none;padding:10px 8px;border-radius:12px;transition:all .2s}
.sidebar-bottom a:hover{color:var(--red);background:rgba(248,113,113,.06)}

/* Sidebar close (mobile only) */
.sidebar-close{display:none}

/* ═══════════════════════════════════════
   MAIN PANEL
   ═══════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--bg)}

/* ═══ Header ═══ */
.header{display:flex;align-items:center;gap:14px;padding:14px 28px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);flex-shrink:0;z-index:10}
.header-icon{width:40px;height:40px;background:linear-gradient(135deg,#1a3a2a,#0f2a1a);border:1.5px solid #2a5a3a;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 16px rgba(52,211,153,.12)}
.header-info{flex:1;min-width:0}
.header-info h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.3px}
.header-info .header-sub{font-size:12px;color:var(--muted);font-weight:400;margin-top:1px}
.header .status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);font-weight:500;padding:6px 14px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.12);border-radius:20px}
.header .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 8px rgba(52,211,153,.5);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.burger{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:6px;border-radius:10px;transition:background .15s}
.burger:hover{background:rgba(255,255,255,.08)}
.header-dots{display:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:10px;font-size:18px;letter-spacing:2px;line-height:1}

/* ═══ Chat area ═══ */
.chat-area{flex:1;overflow-y:auto;padding:24px 32px 16px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:5px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.chat-area::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.14)}

/* ═══ Messages ═══ */
.msg{max-width:65%;padding:16px 20px;border-radius:20px;font-size:14.5px;line-height:1.7;word-wrap:break-word;white-space:pre-wrap;animation:msgIn .3s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.msg.user{align-self:flex-end;background:var(--grad2);color:#fff;border-bottom-right-radius:6px;box-shadow:0 4px 24px rgba(16,185,129,.18)}

/* Bot message row */
.msg-row{display:flex;gap:12px;align-items:flex-end;align-self:flex-start;max-width:72%;animation:msgIn .3s ease-out}
.bot-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,#1a3a2a,#0f2a1a);border:1.5px solid #2a5a3a;box-shadow:0 2px 10px rgba(52,211,153,.12);margin-bottom:2px}
.msg-row .msg{max-width:100%}

.msg.assistant{background:var(--card);border:none;border-bottom-left-radius:6px;color:var(--text2)}
.msg.assistant code{background:rgba(255,255,255,.07);padding:2px 6px;border-radius:5px;font-size:13px;font-family:'SF Mono','Fira Code','Menlo',monospace}
.msg.assistant pre{background:rgba(255,255,255,.03);padding:14px 16px;border-radius:12px;overflow-x:auto;margin:10px 0;border:1px solid rgba(255,255,255,.05)}
.msg.assistant pre code{background:none;padding:0;font-size:12.5px}
.msg.assistant table{border-collapse:collapse;margin:10px 0;font-size:13px;width:100%}
.msg.assistant th,.msg.assistant td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.msg.assistant th{background:rgba(255,255,255,.03);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.msg.assistant td{color:var(--text2)}
.msg.assistant strong{color:#fff}
.msg.assistant a{color:var(--purple);text-decoration:none}
.msg.assistant a:hover{text-decoration:underline}

/* Message actions */
.msg-actions{display:flex;gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.04)}
.msg-actions button{background:none;border:1px solid transparent;color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:8px;font-size:13px;transition:all .15s;display:flex;align-items:center;gap:5px}
.msg-actions button:hover{color:var(--text);background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08)}
.msg-actions button span{font-size:11px;font-weight:500}

.msg-time{font-size:10px;color:var(--muted);margin-top:6px;opacity:.5}
.msg.user .msg-time{text-align:right;color:rgba(255,255,255,.3)}

/* Typing */
.typing{display:flex;gap:5px;padding:16px 20px;background:var(--card);border-radius:20px;border-bottom-left-radius:6px;animation:msgIn .2s ease-out}
.typing span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:typingBounce 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.25}30%{transform:translateY(-6px);opacity:1}}

/* ═══ Welcome ═══ */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;color:var(--muted);text-align:center;padding:40px 32px}
.welcome .logo-big{width:88px;height:88px;background:linear-gradient(135deg,#1a3a2a,#0f2a1a);border:2px solid #2a5a3a;border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:8px;box-shadow:0 12px 40px rgba(52,211,153,.12)}
.welcome h2{color:#fff;font-size:28px;font-weight:700;letter-spacing:-.5px}
.welcome p{font-size:15px;max-width:400px;line-height:1.65;color:var(--muted)}
.welcome-hints{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:16px;max-width:520px}
.welcome-hints button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:16px;font-size:13px;cursor:pointer;transition:all .25s;font-family:inherit;font-weight:500}
.welcome-hints button:hover{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.06);transform:translateY(-2px);box-shadow:0 4px 16px rgba(16,185,129,.1)}
.welcome-hints button:active{transform:scale(.97)}

/* ═══ Input area ═══ */
.input-area{padding:16px 28px;padding-bottom:calc(16px + var(--safe-bottom));border-top:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);flex-shrink:0;display:flex;gap:12px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:24px;padding:14px 22px;font-size:15px;font-family:inherit;resize:none;min-height:50px;max-height:160px;line-height:1.45;outline:none;transition:all .25s}
.input-area textarea:focus{border-color:rgba(16,185,129,.35);box-shadow:0 0 0 3px rgba(16,185,129,.06)}
.input-area textarea::placeholder{color:var(--muted)}
.input-area .btn-send{width:50px;height:50px;background:var(--grad2);border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;box-shadow:0 4px 20px rgba(16,185,129,.3)}
.input-area .btn-send:hover{transform:scale(1.06);box-shadow:0 6px 28px rgba(16,185,129,.4)}
.input-area .btn-send:active{transform:scale(.92)}
.input-area .btn-send:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}
.input-area .btn-send svg{width:20px;height:20px}

/* Overlay */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sidebar-overlay.open{display:block}

/* ═══════════════════════════════════════
   WIDE DESKTOP (>1200px)
   ═══════════════════════════════════════ */
@media(min-width:1200px){
  :root{--sidebar-w:340px}
  .chat-area{padding:28px 48px 20px}
  .input-area{padding:18px 48px;padding-bottom:calc(18px + var(--safe-bottom))}
  .msg{max-width:60%}
  .msg-row{max-width:65%}
  .welcome h2{font-size:32px}
  .welcome .logo-big{width:96px;height:96px;font-size:52px}
}

/* ═══════════════════════════════════════
   MOBILE (<768px)
   ═══════════════════════════════════════ */
@media(max-width:768px){
  /* Lock entire viewport — no bounce scroll */
  html,body{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none}

  /* Main takes full screen as flex column */
  .main{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}

  /* Header: fixed height, no shrink, no scroll */
  .header{flex-shrink:0;position:relative;padding:10px 16px;padding-top:calc(10px + var(--safe-top));gap:10px;background:#000;border-bottom:1px solid rgba(255,255,255,.06);overflow:hidden}
  .header-icon{width:34px;height:34px;border-radius:10px;font-size:18px}
  .header-info h1{font-size:14px}
  .header-info .header-sub{font-size:10px}
  .header .status{padding:4px 10px;font-size:10px}

  /* Chat area: fills remaining space, ONLY scrollable element */
  .chat-area{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain;padding:16px 14px 8px;gap:10px;-webkit-overflow-scrolling:touch}

  /* Input: fixed height at bottom, no shrink, no scroll */
  .input-area{flex-shrink:0;position:relative;padding:10px 14px;padding-bottom:calc(10px + var(--safe-bottom));gap:8px;background:#000;border-top:1px solid rgba(255,255,255,.06);overflow:hidden}
  .input-area textarea{font-size:16px;padding:12px 20px;min-height:46px;max-height:100px;border-radius:24px}
  .input-area .btn-send{width:46px;height:46px}

  /* Sidebar: full-screen overlay, its own scroll context */
  .sidebar{position:fixed;top:0;left:0;z-index:100;transform:translateX(-100%);width:100vw;height:100%;background:#000;border:none;padding-top:var(--safe-top);box-shadow:none;overflow:hidden;display:flex;flex-direction:column}
  .sidebar.open{transform:translateX(0)}
  .sidebar-close{display:flex;position:absolute;top:calc(20px + var(--safe-top));right:20px;background:var(--card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;z-index:101;align-items:center;justify-content:center}

  .sidebar-head{flex-shrink:0;padding:20px 20px 16px}
  .sidebar-head .logo{width:38px;height:38px;border-radius:12px;font-size:20px}
  .sidebar-brand h2{font-size:16px}
  .btn-new{flex-shrink:0;margin:0 16px;width:calc(100% - 32px);padding:14px 0;border-radius:16px;font-size:14px}
  .sidebar-label{flex-shrink:0;padding:16px 16px 8px;font-size:12px}

  /* Only sidebar-list scrolls inside sidebar */
  .sidebar-list{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain;padding:0 8px}
  .conv-item{padding:14px 16px;border-radius:16px;gap:14px;margin-bottom:2px}
  .conv-dot{width:10px;height:10px}
  .conv-item .conv-title{font-size:14px;font-weight:600}
  .conv-item .conv-meta{font-size:11px;margin-top:3px}
  .conv-item .conv-arrow{opacity:1;color:var(--border2)}
  .conv-item .conv-delete{display:none !important}

  .sidebar-bottom{flex-shrink:0;padding:16px 20px;padding-bottom:calc(16px + var(--safe-bottom))}
  .sidebar-bottom a{font-size:14px;padding:12px 8px}

  /* Burger & dots */
  .burger{display:flex;align-items:center;justify-content:center}
  .header-dots{display:block}

  /* Messages */
  .msg{max-width:80%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.6}
  .msg.user{border-bottom-right-radius:6px}
  .msg.assistant{border-bottom-left-radius:6px}
  .msg-row{max-width:88%;gap:8px}
  .bot-avatar{width:28px;height:28px;font-size:16px}
  .msg.assistant pre{padding:10px 12px;font-size:11px;border-radius:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .msg.assistant table{font-size:11px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .msg.assistant th,.msg.assistant td{padding:5px 7px;white-space:nowrap}
  .msg-actions button{padding:6px 8px;font-size:15px}

  /* Welcome: flex inside chat-area, no own scroll */
  .welcome{padding:30px 24px;gap:14px;min-height:0;overflow:hidden}
  .welcome .logo-big{width:64px;height:64px;font-size:36px;border-radius:20px;flex-shrink:0}
  .welcome h2{font-size:20px;flex-shrink:0}
  .welcome p{font-size:14px;max-width:300px;flex-shrink:0}
  .welcome-hints{gap:6px;margin-top:8px;flex-shrink:0}
  .welcome-hints button{font-size:12px;padding:10px 14px;border-radius:14px}
}

/* Small phones */
@media(max-width:380px){
  .header-info h1{font-size:13px}
  .msg{max-width:85%;font-size:13px;padding:10px 14px}
  .input-area textarea{font-size:16px;padding:10px 16px}
  .welcome h2{font-size:18px}
}

/* Landscape phone */
@media(max-height:500px){
  .welcome .logo-big{width:48px;height:48px;font-size:26px}
  .welcome h2{font-size:16px}
  .welcome p{display:none}
  .welcome-hints{margin-top:4px}
}
</style>
</head>
<body>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
  <div class="sidebar-head">
    <div class="logo">&#x1F40A;</div>
    <div class="sidebar-brand">
      <h2>Terabot</h2>
      <span>AI Data Center</span>
    </div>
  </div>

  <button class="btn-new" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Chat
  </button>

  <div class="sidebar-label">
    History
    <a href="javascript:void(0)" id="clearAllBtn" onclick="clearAllConvs()">Clear all</a>
  </div>

  <div class="sidebar-list" id="convList">
    <div class="sidebar-empty">No conversations yet.<br>Start chatting to see history here.</div>
  </div>

  <div class="sidebar-bottom">
    <a href="/logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Logout
    </a>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="header">
    <button class="burger" onclick="toggleSidebar()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
    </button>
    <div class="header-icon">&#x1F40A;</div>
    <div class="header-info">
      <h1>Terabot</h1>
      <div class="header-sub">AI Data Center</div>
    </div>
    <div class="status"><div class="status-dot"></div>Online</div>
    <button class="header-dots" onclick="toggleSidebar()">&#8942;</button>
  </div>

  <div class="chat-area" id="chatArea">
