<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terabot : AI Data Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0f1a;--card:#1a1d2e;--border:#2a2d3e;--text:#e0e0e0;--muted:#6b7280;--purple:#7c3aed;--blue:#4c6ef5;--green:#10b981;--red:#ef4444;--sidebar-w:280px}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s ease}
.sidebar-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-head .logo{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.sidebar-head h2{font-size:13px;font-weight:700;color:#fff;flex:1}
.btn-new{background:linear-gradient(135deg,var(--blue),var(--purple));border:none;color:#fff;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-new:hover{opacity:.85}

.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.sidebar-list::-webkit-scrollbar{width:4px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:background .15s;position:relative}
.conv-item:hover{background:rgba(255,255,255,.05)}
.conv-item.active{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3)}
.conv-item .conv-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:24px}
.conv-item .conv-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:8px}
.conv-item .conv-delete{position:absolute;top:10px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;display:none}
.conv-item:hover .conv-delete{display:block}
.conv-item .conv-delete:hover{color:var(--red);background:rgba(239,68,68,.1)}

.sidebar-empty{padding:24px 16px;text-align:center;color:var(--muted);font-size:12px}

.sidebar-bottom{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-bottom a{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;text-decoration:none;padding:6px 0;transition:color .15s}
.sidebar-bottom a:hover{color:var(--red)}

/* Main panel */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
.header h1{font-size:18px;font-weight:700;color:#fff;flex:1}
.header .status-dot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0}
.burger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg{max-width:75%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.assistant code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;font-size:13px}
.msg.assistant pre{background:rgba(0,0,0,.3);padding:10px 12px;border-radius:6px;overflow-x:auto;margin:8px 0}
.msg.assistant pre code{background:none;padding:0}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px}
.msg.user .msg-time{text-align:right;color:rgba(255,255,255,.5)}

.typing{align-self:flex-start;display:flex;gap:4px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:4px}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted);text-align:center;padding:40px}
.welcome .logo-big{width:64px;height:64px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;color:#fff;margin-bottom:8px}
.welcome h2{color:#fff;font-size:20px;font-weight:600}
.welcome p{font-size:14px;max-width:400px;line-height:1.5}

/* Input area */
.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--card);flex-shrink:0;display:flex;gap:10px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;resize:none;min-height:44px;max-height:150px;line-height:1.4;outline:none;transition:border-color .15s}
.input-area textarea:focus{border-color:var(--purple)}
.input-area textarea::placeholder{color:var(--muted)}
.input-area .btn-send{width:44px;height:44px;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;border-radius:10px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.input-area .btn-send:disabled{opacity:.4;cursor:not-allowed}
.input-area .btn-send svg{width:20px;height:20px}

/* Overlay for mobile sidebar */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.sidebar-overlay.open{display:block}

@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;z-index:100;transform:translateX(-100%);width:280px}
  .sidebar.open{transform:translateX(0)}
  .burger{display:block}
  .header{padding:10px 14px;gap:8px}
  .header h1{font-size:15px}
  .chat-area{padding:14px}
  .msg{max-width:90%;font-size:13px;padding:10px 13px}
  .input-area{padding:10px 14px}
}
</style>
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar: Chat History -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <div class="logo">T</div>
    <h2>Chat History</h2>
    <button class="btn-new" onclick="newChat()">+ New</button>
  </div>
  <div class="sidebar-list" id="convList">
    <div class="sidebar-empty" id="convEmpty">No conversations yet</div>
  </div>
  <div class="sidebar-bottom">
    <a href="/logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Logout
    </a>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <!-- Header -->
  <div class="header">
    <button class="burger" onclick="toggleSidebar()">&#9776;</button>
    <h1>Terabot : AI Data Center</h1>
    <div class="status-dot" title="Online"></div>
  </div>

  <!-- Chat messages -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="logo-big">T</div>
      <h2>Terabot : AI Data Center</h2>
      <p>Ask me anything about your data, analytics, app performance, or any question you need help with.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="chatInput" placeholder="Type your message..." rows="1"></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script src="/static/ai_chat.js"></script>
</body>
</html>
