<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terasofts Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--sidebar:#12151f;--card:#1a1d2e;--border:#252836;--text:#e0e0e0;--muted:#6b7280;--purple:#7c3aed;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#4c6ef5}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden}

/* Sidebar */
.sidebar{width:220px;min-height:100vh;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
.sidebar-brand{padding:20px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-brand .logo{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.sidebar-brand h2{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.sidebar-brand h2 span{font-size:11px;font-weight:400;color:var(--muted);display:block}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:#fff;font-size:13px;font-weight:500;background:rgba(124,58,237,.1);border-left:3px solid var(--purple)}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:1}
.sidebar-bottom{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-bottom .sync{font-size:10px;color:var(--muted);display:block}

/* Main */
.main{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column}

/* Filters */
.filters{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--sidebar)}
.filters select,.filters input,.filters button{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.filters select:hover,.filters button:hover{border-color:var(--purple)}
.filters .spacer{flex:1}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple))!important;border:none!important;color:#fff;font-weight:600;padding:7px 18px}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-export{background:var(--card)!important;color:var(--cyan);border:1px solid var(--border)!important;font-weight:600}
.btn-export:hover{border-color:var(--cyan)!important}

/* Content */
.content{flex:1;padding:20px 24px;overflow-y:auto}

/* Stats bar */
.stats-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--muted)}
.stat strong{color:#fff;font-size:14px;margin-left:6px}

/* Table */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.3px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text)}
th.sorted-asc::after{content:" \u25B2";color:var(--purple)}
th.sorted-desc::after{content:" \u25BC";color:var(--purple)}
td{padding:8px 12px;border-bottom:1px solid rgba(37,40,54,.5);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.02)}
.good{color:var(--green)}.bad{color:var(--red)}

/* Pagination */
.pagination{display:flex;align-items:center;gap:8px;margin-top:12px;justify-content:center}
.pagination button{background:var(--card);color:var(--muted);border:1px solid var(--border);padding:5px 12px;border-radius:4px;font-size:11px;cursor:pointer}
.pagination button.active,.pagination button:hover{border-color:var(--purple);color:var(--purple)}
.pagination button:disabled{opacity:.3;cursor:not-allowed}
.pagination span{font-size:11px;color:var(--muted)}

/* Spinner */
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px 20px;color:var(--muted);font-size:13px}

/* Mobile */
.mobile-header{display:none;position:sticky;top:0;z-index:99;background:var(--sidebar);border-bottom:1px solid var(--border);padding:10px 12px;align-items:center;gap:8px}
.mobile-header .logo{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.mobile-header h2{font-size:14px;font-weight:700;color:#fff;flex:1}
.burger{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.sidebar-overlay.open{display:block}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;width:260px}
  .sidebar.open{transform:translateX(0)}
  .mobile-header{display:flex}
  .main{margin-left:0;width:100vw}
  .filters{padding:8px 10px;gap:6px;flex-wrap:wrap}
  .filters select,.filters input,.filters button{padding:6px 8px;font-size:11px;flex-shrink:1}
  .content{padding:10px 8px}
  .stats-bar{flex-direction:column;gap:6px}
  .table-wrap{border-radius:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:calc(100vw - 16px)}
  table{font-size:10px;min-width:700px}
  th{padding:6px;font-size:8px}
  td{padding:5px 6px;font-size:10px}
}
</style>
</head>
<body>

<!-- Mobile header -->
<div class="mobile-header">
  <div class="logo">A</div>
  <h2 style="color:var(--purple)">Data Gateway</h2>
  <button class="burger" onclick="toggleSidebar()">&#9776;</button>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="logo">A</div>
    <h2>Terasofts<span>Dashboard</span></h2>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
      Data Gateway
    </div>
  </nav>
  <div class="sidebar-bottom">
    <span class="sync">Last fetched: <span id="syncTime">-</span></span>
    <a href="/logout" style="display:flex;align-items:center;gap:6px;margin-top:10px;color:var(--muted);font-size:12px;text-decoration:none;padding:6px 0;transition:color .15s" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--muted)'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Logout
    </a>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="filters">
    <label style="font-size:11px;color:var(--muted)">Date Range</label>
    <select id="dateRange">
      <option value="7">Last 7 days</option>
      <option value="14">Last 14 days</option>
      <option value="30" selected>Last 30 days</option>
      <option value="custom">Custom</option>
    </select>
    <input type="date" id="startDate" style="display:none">
    <input type="date" id="endDate" style="display:none">

    <label style="font-size:11px;color:var(--muted);margin-left:8px">App</label>
    <select id="appFilter">
      <option value="all">All Apps</option>
    </select>

    <button class="btn-primary" id="fetchBtn" onclick="fetchData()">Fetch Data</button>
    <div class="spacer"></div>
    <button class="btn-export" id="exportBtn" onclick="exportCSV()" disabled>Export CSV</button>
  </div>

  <div class="content">
    <div class="stats-bar" id="statsBar" style="display:none">
      <div class="stat">Total Rows<strong id="statRows">0</strong></div>
      <div class="stat">Period<strong id="statPeriod">-</strong></div>
      <div class="stat">Fetched At<strong id="statTime">-</strong></div>
    </div>

    <div id="loadingState" class="loading-state" style="display:none">
      <div class="spinner"></div>
      <span>Fetching data from Adjust API...</span>
    </div>

    <div id="emptyState" class="loading-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" style="opacity:.3"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
      <span>Select filters and click <strong>Fetch Data</strong> to load Adjust data</span>
    </div>

    <div class="table-wrap" id="tableWrap" style="display:none">
      <table>
        <thead>
          <tr id="tableHead">
            <th data-col="date">Date</th>
            <th data-col="app">App</th>
            <th data-col="country">Country</th>
            <th data-col="installs">Installs</th>
            <th data-col="cost">Cost</th>
            <th data-col="revenue">Revenue</th>
            <th data-col="sessions">Sessions</th>
            <th data-col="ecpi">eCPI</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination" style="display:none"></div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let allRows = [];
let sortedRows = [];
let currentPage = 1;
let sortCol = 'date';
let sortDir = 'desc';

// Date range toggle
const dateRange = document.getElementById('dateRange');
const startDate = document.getElementById('startDate');
const endDate = document.getElementById('endDate');
dateRange.addEventListener('change', () => {
  const custom = dateRange.value === 'custom';
  startDate.style.display = custom ? '' : 'none';
  endDate.style.display = custom ? '' : 'none';
});

// Load app list
async function loadApps() {
  try {
    const resp = await fetch('/api/app_list');
    if (resp.status === 401) { window.location.href = '/login'; return; }
    const data = await resp.json();
    const sel = document.getElementById('appFilter');
    data.apps.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.code;
      opt.textContent = a.name;
      sel.appendChild(opt);
    });
  } catch (e) { console.error('Failed to load apps', e); }
}
loadApps();

function getDateRange() {
  const v = dateRange.value;
  if (v === 'custom') {
    return { start: startDate.value, end: endDate.value };
  }
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - parseInt(v));
  return {
    start: start.toISOString().slice(0, 10),
    end: end.toISOString().slice(0, 10),
  };
}

async function fetchData() {
  const btn = document.getElementById('fetchBtn');
  const loading = document.getElementById('loadingState');
  const empty = document.getElementById('emptyState');

  btn.disabled = true;
  btn.textContent = 'Fetching...';
  loading.style.display = '';
  empty.style.display = 'none';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';

  const { start, end } = getDateRange();
  const app = document.getElementById('appFilter').value;
  const params = new URLSearchParams({ start, end });
  if (app !== 'all') params.set('app', app);

  try {
    const resp = await fetch(`/api/data_gateway?${params}`);
    if (resp.status === 401) { window.location.href = '/login'; return; }
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }

    allRows = data.rows || [];
    sortCol = 'date';
    sortDir = 'desc';
    sortAndRender();

    // Stats
    document.getElementById('statRows').textContent = data.total_rows.toLocaleString();
    document.getElementById('statPeriod').textContent = data.date_period.replace(':', ' to ');
    const fetched = new Date(data.fetched_at);
    document.getElementById('statTime').textContent = fetched.toLocaleString();
    document.getElementById('syncTime').textContent = fetched.toLocaleTimeString();
    document.getElementById('statsBar').style.display = '';
    document.getElementById('exportBtn').disabled = allRows.length === 0;
  } catch (e) {
    alert('Error fetching data: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Fetch Data';
    loading.style.display = 'none';
  }
}

function sortAndRender() {
  sortedRows = [...allRows];
  sortedRows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'number') return sortDir === 'asc' ? va - vb : vb - va;
    va = String(va || ''); vb = String(vb || '');
    return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  currentPage = 1;
  renderTable();
  updateSortHeaders();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = sortedRows.slice(start, start + PAGE_SIZE);

  if (sortedRows.length === 0) {
    document.getElementById('emptyState').style.display = '';
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  tbody.innerHTML = pageRows.map(r => `<tr>
    <td>${esc(r.date)}</td>
    <td>${esc(r.app)}</td>
    <td>${esc(r.country)}</td>
    <td>${r.installs.toLocaleString()}</td>
    <td>$${r.cost.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
    <td class="${r.revenue > r.cost ? 'good' : ''}">$${r.revenue.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
    <td>${r.sessions.toLocaleString()}</td>
    <td>$${r.ecpi.toFixed(4)}</td>
  </tr>`).join('');

  document.getElementById('tableWrap').style.display = '';
  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(sortedRows.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.style.display = 'none'; return; }

  let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">&laquo; Prev</button>`;
  html += `<span>Page ${currentPage} of ${totalPages}</span>`;
  html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next &raquo;</button>`;
  pag.innerHTML = html;
  pag.style.display = '';
}

function goPage(p) {
  currentPage = p;
  renderTable();
  document.getElementById('tableWrap').scrollIntoView({behavior:'smooth'});
}

function updateSortHeaders() {
  document.querySelectorAll('#tableHead th').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    }
  });
}

// Column sort click
document.getElementById('tableHead').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th || !th.dataset.col) return;
  if (sortCol === th.dataset.col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = th.dataset.col;
    sortDir = ['installs','cost','revenue','sessions','ecpi'].includes(sortCol) ? 'desc' : 'asc';
  }
  sortAndRender();
});

function exportCSV() {
  if (!sortedRows.length) return;
  const headers = ['Date','App','Country','Installs','Cost','Revenue','Sessions','eCPI'];
  const lines = [headers.join(',')];
  sortedRows.forEach(r => {
    lines.push([
      r.date,
      `"${(r.app||'').replace(/"/g,'""')}"`,
      r.country,
      r.installs,
      r.cost,
      r.revenue,
      r.sessions,
      r.ecpi,
    ].join(','));
  });
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `adjust_data_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Mobile sidebar toggle
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
</script>
</body>
</html>
